<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speaking Hub - Admin Panel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-bg: #0f0f0f;
      --color-bg-secondary: #1a1a1a;
      --color-bg-tertiary: #262626;
      --color-border: #333333;
      --color-text-primary: #ffffff;
      --color-text-secondary: #a3a3a3;
      --color-accent: #00d9ff;
      --color-success: #10b981;
      --color-warning: #f59e0b;
      --color-danger: #ef4444;
      --color-blue: #3b82f6;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-color: var(--color-bg);
      color: var(--color-text-primary);
      line-height: 1.6;
    }

    .app-container {
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background-color: var(--color-bg-secondary);
      border-right: 1px solid var(--color-border);
      padding: 20px;
      overflow-y: auto;
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
      color: var(--color-accent);
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-menu {
      list-style: none;
    }

    .nav-item {
      margin-bottom: 8px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      color: var(--color-text-secondary);
      text-decoration: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      background-color: transparent;
      border: none;
      width: 100%;
      text-align: left;
      font-size: 14px;
    }

    .nav-link:hover {
      color: var(--color-text-primary);
      background-color: var(--color-bg-tertiary);
    }

    .nav-link.active {
      color: var(--color-accent);
      background-color: var(--color-bg-tertiary);
    }

    .nav-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .user-profile {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--color-border);
    }

    .logout-btn {
      width: 100%;
      padding: 10px;
      background-color: var(--color-danger);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .logout-btn:hover {
      opacity: 0.9;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      background-color: var(--color-bg-secondary);
      border-bottom: 1px solid var(--color-border);
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-title {
      font-size: 24px;
      font-weight: 600;
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      background-color: var(--color-bg-tertiary);
      border-radius: 6px;
      font-size: 14px;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background-color: var(--color-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-bg);
      font-weight: 600;
      font-size: 14px;
    }

    /* Content Area */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 40px;
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      border-bottom: 1px solid var(--color-border);
    }

    .tab-button {
      padding: 12px 0;
      background: none;
      border: none;
      color: var(--color-text-secondary);
      cursor: pointer;
      font-size: 14px;
      border-bottom: 2px solid transparent;
      transition: all 0.2s ease;
    }

    .tab-button:hover {
      color: var(--color-text-primary);
    }

    .tab-button.active {
      color: var(--color-accent);
      border-bottom-color: var(--color-accent);
    }

    /* Tables */
    .table-container {
      overflow-x: auto;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead {
      background-color: var(--color-bg-secondary);
      border-top: 1px solid var(--color-border);
      border-bottom: 1px solid var(--color-border);
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      color: var(--color-text-secondary);
    }

    td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--color-border);
    }

    tbody tr:hover {
      background-color: var(--color-bg-secondary);
    }

    /* Status Badge */
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-new {
      background-color: rgba(59, 130, 246, 0.1);
      color: #3b82f6;
    }

    .status-check {
      background-color: rgba(245, 158, 11, 0.1);
      color: #f59e0b;
    }

    .status-time {
      background-color: rgba(59, 130, 246, 0.1);
      color: #3b82f6;
    }

    .status-not {
      background-color: rgba(239, 68, 68, 0.1);
      color: #ef4444;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background-color: var(--color-accent);
      color: var(--color-bg);
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .btn-secondary {
      background-color: var(--color-bg-tertiary);
      color: var(--color-text-primary);
      border: 1px solid var(--color-border);
    }

    .btn-secondary:hover {
      background-color: var(--color-border);
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
    }

    /* Forms */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text-primary);
    }

    .form-input,
    .form-textarea,
    .form-select {
      width: 100%;
      padding: 10px 12px;
      background-color: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      color: var(--color-text-primary);
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .form-input:focus,
    .form-textarea:focus,
    .form-select:focus {
      outline: none;
      border-color: var(--color-accent);
      box-shadow: 0 0 0 2px rgba(0, 217, 255, 0.1);
    }

    .form-textarea {
      resize: vertical;
      min-height: 100px;
    }

    /* Cards */
    .card {
      background-color: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background-color: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 24px;
      width: 90%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--color-text-secondary);
      cursor: pointer;
      font-size: 24px;
    }

    .modal-footer {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      justify-content: flex-end;
    }

    /* Toast Notifications */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 16px 20px;
      border-radius: 6px;
      font-size: 14px;
      z-index: 2000;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .toast-success {
      background-color: var(--color-success);
      color: white;
    }

    .toast-error {
      background-color: var(--color-danger);
      color: white;
    }

    .toast-info {
      background-color: var(--color-blue);
      color: white;
    }

    /* Loading State */
    .loading {
      display: inline-block;
      width: 8px;
      height: 8px;
      background-color: var(--color-accent);
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Login Page */
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: var(--color-bg);
    }

    .login-box {
      background-color: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }

    .login-logo {
      font-size: 24px;
      font-weight: 600;
      color: var(--color-accent);
      margin-bottom: 30px;
      text-align: center;
    }

    .login-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      text-align: center;
    }

    .login-subtitle {
      color: var(--color-text-secondary);
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }

    /* Responsiveness */
    @media (max-width: 768px) {
      .app-container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--color-border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .nav-menu {
        display: flex;
        gap: 20px;
      }

      .user-profile {
        position: static;
        border-top: none;
        border-left: 1px solid var(--color-border);
        padding: 0;
        padding-left: 20px;
      }

      .header {
        padding: 16px 20px;
      }

      .content {
        padding: 20px;
      }

      table {
        font-size: 12px;
      }

      th, td {
        padding: 8px 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="admin.js"></script>
</body>
</html>
